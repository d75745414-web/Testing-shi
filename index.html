<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zypher</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root{--theme:#4c6fff}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#05070d;color:white;display:flex;min-height:100vh;overflow:hidden}
.auth-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0a0e1a,#05070d);display:flex;align-items:center;justify-content:center;z-index:1000;transition:opacity .6s ease}
.login-container,.signup-container{text-align:center;width:100%;max-width:380px;padding:40px 30px}
.welcome-text{font-size:28px;font-weight:600;margin-bottom:8px}
.subtitle{color:#9aa4c7;margin-bottom:40px;font-size:15px}
.input-group{margin-bottom:20px;text-align:left}
label{display:block;margin-bottom:8px;color:#9aa4c7;font-size:14px}
input{width:100%;padding:14px 16px;border-radius:12px;border:none;background:#0c1224;color:white;font-size:16px;outline:none;transition:.3s}
input:focus{box-shadow:0 0 0 3px rgba(76,111,255,.3)}
.password-wrapper{position:relative}
.eye{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:#9aa4c7;cursor:pointer;font-size:18px}
.signin-btn,.create-btn{width:100%;padding:14px;background:var(--theme);color:white;border:none;border-radius:12px;font-size:16px;font-weight:500;cursor:pointer;margin-top:10px;transition:.25s}
.signin-btn:hover,.create-btn:hover{background:#5e7fff;transform:translateY(-2px);box-shadow:0 0 20px rgba(76,111,255,.5)}
.signup-text,.signin-text{margin-top:30px;color:#9aa4c7;font-size:14px}
.signup-text span,.signin-text span{color:var(--theme);cursor:pointer}
#dashboard{display:none;width:100%;height:100vh}
.sidebar{width:240px;background:#0b0e17;padding:25px 15px;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.05)}
.logo{font-size:22px;font-weight:600;margin-bottom:30px}
.logo span{color:var(--theme)}
.plan{background:#141a33;padding:6px 10px;border-radius:6px;font-size:12px;margin-top:6px;display:inline-block;color:var(--theme)}
.menu{display:flex;flex-direction:column;gap:8px}
.menu button{display:flex;align-items:center;gap:12px;background:none;border:none;color:#9aa4c7;padding:12px;border-radius:10px;cursor:pointer;font-size:14px;transition:.25s;border:2px solid transparent}
.menu button:hover{background:#11162b;color:white;transform:translateX(4px);box-shadow:0 0 10px rgba(76,111,255,.25)}
.menu button:active{transform:scale(.95)}
.menu .active{background:var(--theme);color:white;border:2px solid #7e9aff;box-shadow:0 0 14px rgba(76,111,255,.6)}
.main{flex:1;padding:30px;overflow-y:auto}
.page{display:none;opacity:0;transform:translateY(15px);transition:.35s}
.page.active{display:block;opacity:1;transform:translateY(0)}
.header h1{font-size:26px;margin-bottom:25px}
.header span{color:var(--theme)}
.card{background:#0c1224;border-radius:14px;padding:20px;display:flex;align-items:center;gap:15px;margin-bottom:20px}
.card i{font-size:22px;background:var(--theme);padding:12px;border-radius:10px}
.activity{background:#0c1224;border-radius:14px;padding:20px;margin-top:10px}
.activity-item{display:flex;justify-content:space-between;align-items:center;background:#090f1f;padding:14px;border-radius:10px}
.activity-item button{background:var(--theme);border:none;padding:8px 14px;border-radius:8px;color:white;cursor:pointer;transition:.25s}
.search-container{margin-bottom:20px;position:relative}
.search-input{width:100%;padding:14px 16px 14px 45px;border-radius:12px;border:none;background:#0c1224;color:white;font-size:16px;outline:none;box-shadow:0 0 0 2px rgba(76,111,255,.1);transition:.3s}
.search-input:focus{box-shadow:0 0 0 3px rgba(76,111,255,.3)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#9aa4c7;font-size:18px}
button.action{background:var(--theme);border:none;padding:10px 16px;border-radius:8px;color:white;cursor:pointer;transition:.25s}
.games{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:25px}
.gamecard{position:relative;border-radius:20px;overflow:hidden;background:#000;height:200px;display:none}
.gamecard.visible{display:block}
.gamecard img{width:100%;height:100%;object-fit:cover;filter:brightness(.6)}
.gamecontent{position:absolute;top:0;left:0;width:100%;height:100%;padding:20px;display:flex;flex-direction:column;justify-content:flex-end}
.gametitle{font-size:20px;font-weight:600;margin-bottom:10px}
.tags{display:flex;gap:8px;margin-bottom:12px}
.tag{background:rgba(76,111,255,.35);border:1px solid rgba(76,111,255,.6);padding:5px 10px;border-radius:20px;font-size:11px}
.tag.red{background:rgba(255,0,0,.35);border:1px solid rgba(255,50,50,.7);color:#ffdddd}
.launch{background:var(--theme);border:none;padding:10px 16px;border-radius:30px;color:white;font-weight:500;cursor:pointer;font-size:13px;width:160px;transition:.2s}
.launch:hover{transform:scale(1.08);box-shadow:0 0 12px var(--theme)}
.blurred{filter:blur(8px);pointer-events:none;user-select:none}
.playerbox{position:absolute;bottom:18px;right:18px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.1);padding:8px 14px;border-radius:12px;display:flex;align-items:center;gap:8px;font-size:13px}
.playerbox i{font-size:14px;color:white}
.playerdot{width:10px;height:10px;background:#39ff6a;border-radius:50%}
@media(max-width:900px){.sidebar{position:fixed;bottom:0;width:100%;height:65px;flex-direction:row;padding:0;border-right:none;border-top:1px solid rgba(255,255,255,.05)}.logo,.plan{display:none}.menu{flex-direction:row;justify-content:space-around;width:100%}.menu button{flex-direction:column;font-size:11px;gap:4px;padding:8px}.main{padding:20px;padding-bottom:90px}.games{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="login-screen" class="auth-screen">
    <div class="login-container">
        <h1 class="welcome-text">Welcome Back</h1>
        <p class="subtitle">Sign in to your Zypher account</p>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="loginUsername" placeholder="Enter your username">
        </div>
        <div class="input-group">
            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" id="loginPassword" placeholder="Enter your password">
                <i class="fa-solid fa-eye eye" id="toggleLoginPassword"></i>
            </div>
        </div>
        <button class="signin-btn" onclick="attemptLogin()">→ Sign In</button>
        <p class="signup-text">Don't have an account? <span onclick="showSignup()">Sign up</span></p>
    </div>
</div>

<div id="signup-screen" class="auth-screen" style="display:none;opacity:0">
    <div class="signup-container">
        <h1 class="welcome-text">Create Account</h1>
        <p class="subtitle">Join Zypher today</p>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="signupUsername" placeholder="Choose a username">
        </div>
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="signupEmail" placeholder="Enter your email">
        </div>
        <div class="input-group">
            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" id="signupPassword" placeholder="Create a password">
                <i class="fa-solid fa-eye eye" id="toggleSignupPassword"></i>
            </div>
        </div>
        <div class="input-group">
            <label>Confirm Password</label>
            <div class="password-wrapper">
                <input type="password" id="signupConfirmPassword" placeholder="Confirm your password">
                <i class="fa-solid fa-eye eye" id="toggleConfirmPassword"></i>
            </div>
        </div>
        <button class="create-btn" onclick="createAccount()">
            <i class="fa-solid fa-user-plus"></i> Create Account
        </button>
